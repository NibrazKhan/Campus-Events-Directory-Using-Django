{% extends "events_app/base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
    <!-- text-center: Centers all text inside the div-->
    <!-- py-5 allows large vertical padding(top and bottom) -->
    <div class="text-center py-5">
        <!-- display-5 is large bootstrap heading style -->
        <h1 class="display-5">404 - Page Not Found</h1>
        <!-- lead means slightly larger, softer text and text-muted is slightly gray colored text -->
        <p class="lead text-muted">
            The page you are looking for does not exist or is not publicly available.
        </p>
        <!-- Added a button to go back to the approved event list, has margin top 3 spacing above it. -->
        <a href="{% url 'event_list' %}" class="btn btn-primary mt-3">Back to Approved Events</a>
    </div>
{% endblock %}
